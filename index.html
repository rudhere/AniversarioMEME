<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Aniversário - Otoniel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #1a1016;
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
        }

        /* FUNDO: Nome exato background.jpg */
        .global-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .page-container {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px 0;
        }

        .card-convite {
            background: white;
            width: 92%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 4px solid #ec4899;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background-color: #ec4899;
            color: white;
            padding: 12px;
            text-align: center;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .card-body {
            padding: 10px;
            text-align: center;
            background-color: #fff;
        }

        .img-display {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        .info-footer {
            padding: 15px;
            background: #fdf2f8;
            border-top: 2px dashed #f9a8d4;
        }

        .btn-mapa {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            text-decoration: none;
            margin-top: 10px;
        }

        .font-naruto {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
        }

        .btn-ninja {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            border: 3px solid white;
            font-size: 1.6rem;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.8);
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .glass-box-confirm {
            background: rgba(20, 10, 15, 0.95);
            padding: 1.5rem;
            border-radius: 2rem;
            border: 3px solid #ec4899;
            color: white;
            width: 90%;
            max-width: 420px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.6);
        }

        /* Botão de Música */
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(236, 72, 153, 0.8);
            border: 2px solid white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .sakura {
            position: fixed;
            top: -10%;
            background-color: #ffb7d5;
            border-radius: 100% 10% 100% 10%;
            pointer-events: none;
            z-index: 5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Controle de Música -->
    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon">🔇</span>
    </div>

    <!-- Áudio do Repositório -->
    <audio id="naruto-theme" loop>
        <source src="naruto-soundtrack-sadness-and-sorrow-(full-version)-(128-kbps)-made-with-Voicemod.mp3" type="audio/mpeg">
    </audio>

    <div class="global-bg"></div>
    <div class="overlay"></div>
    <div id="sakura-container"></div>

    <!-- TELA PRINCIPAL -->
    <div id="main-invite" class="page-container">
        <div class="card-convite">
            <div class="card-header">VOCÊ FOI CONVOCADO!</div>
            <div class="card-body">
                <img src="convite.png" alt="Convite Otoniel" class="img-display">
            </div>
            <div class="info-footer">
                <div class="text-center mb-1">
                    <p class="text-xs text-pink-600 font-bold uppercase tracking-widest">Localização</p>
                    <p class="text-sm font-bold text-gray-800">Q. 101 Loja 7 - Águas Claras</p>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=Q.+101+Loja+7+-+Águas+Claras+Brasília+-+DF" target="_blank" class="btn-mapa">
                    📍 Ver no Google Maps
                </a>
            </div>
        </div>

        <button onclick="confirmar()" class="btn-ninja font-naruto animate-bounce">
            Confirmar Presença
        </button>
    </div>

    <!-- TELA DE CONFIRMAÇÃO -->
    <div id="confirmation-page" class="page-container" style="display: none; opacity: 0; transition: opacity 0.5s ease;">
        <div class="glass-box-confirm">
            <h2 class="font-naruto text-4xl mb-4 text-[#ec4899]">MISSÃO ACEITA!</h2>
            
            <div class="mb-6 w-full rounded-xl overflow-hidden border-2 border-pink-500">
                <img src="convite.png" alt="Convite Confirmado" class="img-display">
            </div>

            <p class="text-lg font-bold mb-4 text-white">Presença confirmada!</p>
            
            <button onclick="voltar()" class="text-pink-300 font-bold uppercase text-xs tracking-widest border-b border-pink-300 pb-1">
                ← Voltar
            </button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('naruto-theme');
        const musicIcon = document.getElementById('music-icon');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                musicIcon.innerText = '🔇';
            } else {
                audio.play();
                musicIcon.innerText = '🔊';
            }
            isPlaying = !isPlaying;
        }

        function confirmar() {
            // Tenta tocar a música ao clicar no botão (interação do usuário)
            if (!isPlaying) {
                toggleMusic();
            }

            document.getElementById('main-invite').style.display = 'none';
            const p2 = document.getElementById('confirmation-page');
            p2.style.display = 'flex';
            setTimeout(() => { p2.style.opacity = '1'; }, 50);
        }

        function voltar() {
            const p2 = document.getElementById('confirmation-page');
            p2.style.opacity = '0';
            setTimeout(() => {
                p2.style.display = 'none';
                document.getElementById('main-invite').style.display = 'flex';
            }, 500);
        }

        function createSakura() {
            const container = document.getElementById('sakura-container');
            if (container.children.length > 20) return;
            const p = document.createElement('div');
            const size = (Math.random() * 10 + 8) + 'px';
            p.className = 'sakura';
            p.style.left = (Math.random() * 100) + 'vw';
            p.style.width = size;
            p.style.height = size;
            p.style.animationDuration = (Math.random() * 3 + 4) + 's';
            container.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }
        setInterval(createSakura, 600);
    </script>
</body>
</html>
